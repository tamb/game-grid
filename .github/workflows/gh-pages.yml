# Build demo + TypeDoc into gh-pages/ and deploy to GitHub Pages.
name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix demo

      - name: Build site (TypeDoc + Parcel into gh-pages/)
        run: |
          node scripts/prepare-gh-pages.js
          npm run build
          npm run docs
          node scripts/build-demo-gh-pages.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - id: deploy
        uses: actions/deploy-pages@v4
